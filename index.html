<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Apparel | Shop</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); }
        
        /* Header & Search */
        header { background: var(--primary); color: white; padding: 1rem 5%; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .search-container { flex-grow: 0.5; display: flex; }
        #searchBar { width: 100%; padding: 8px; border-radius: 4px; border: none; }

        /* Product Grid */
        .container { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; padding: 15px; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        .card-info { padding: 10px 0; }
        .price { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        
        /* Controls */
        .qty-input { width: 50px; padding: 5px; margin-right: 10px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .add-btn:hover { background: #34495e; }

        /* Shopping Cart Section */
        .cart-section { background: white; margin: 2rem 5%; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .checkout-form { margin-top: 20px; display: flex; flex-direction: column; max-width: 400px; gap: 10px; }
        .checkout-form input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h2>Modern Apparel</h2>
    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search for clothes..." onkeyup="filterProducts()">
    </div>
    <div>Items: <span id="cart-count">0</span></div>
</header>

<div class="container" id="productGrid">
    <!-- Products generated by JS -->
</div>

<div class="cart-section" id="cart">
    <h3>Your Shopping Cart</h3>
    <div id="cartItems">Your cart is empty.</div>
    <hr>
    <h4>Total: $<span id="totalPrice">0</span></h4>
    
    <div class="checkout-form">
        <label>Enter Email for Order Confirmation:</label>
        <input type="email" id="userEmail" placeholder="name@example.com">
        <button class="add-btn" onclick="processOrder()">Complete Purchase</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Premium Cotton T-Shirt", price: 29, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
        { id: 2, name: "Vintage Denim Jacket", price: 89, image: "https://media.cnn.com/api/v1/images/stellar/prod/best-denim-jackets-cnnu-1.jpg?c=16x9&q=h_833,w_1480,c_fill" },
        { id: 3, name: "Slim Fit Chinos", price: 55, image: "https://www.beyoung.in/api/cache/catalog/products/trousers/slim_trousers_update/rich_black_slim-fit_trousers_base_09_06_2025_700x933.jpg" },
        { id: 4, name: "Urban Hoodie", price: 45, image: "https://assets.ajio.com/medias/sys_master/root/20231014/4ful/652a17c8afa4cf41f5435411/-473Wx593H-466705311-black-MODEL.jpg" }
    ];

    let cart = [];

    function renderProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = items.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <p class="price">$${p.price}</p>
                    <input type="number" id="qty-${p.id}" value="1" min="1" class="qty-input">
                    <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        const qty = parseInt(document.getElementById(`qty-${id}`).value);
        
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.qty += qty;
        } else {
            cart.push({ ...product, qty: qty });
        }
        updateCart();
    }

    function updateCart() {
        const cartDiv = document.getElementById('cartItems');
        const countSpan = document.getElementById('cart-count');
        const totalSpan = document.getElementById('totalPrice');
        
        if (cart.length === 0) {
            cartDiv.innerHTML = "Your cart is empty.";
            countSpan.innerText = "0";
            totalSpan.innerText = "0";
            return;
        }

        let total = 0;
        let count = 0;
        
        cartDiv.innerHTML = cart.map(item => {
            total += item.price * item.qty;
            count += item.qty;
            return `
                <div class="cart-item">
                    <span>${item.name} (x${item.qty})</span>
                    <span>$${item.price * item.qty}</span>
                </div>
            `;
        }).join('');

        countSpan.innerText = count;
        totalSpan.innerText = total;
    }

    function filterProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(term));
        renderProducts(filtered);
    }

    function processOrder() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes('@')) {
            alert("Please enter a valid email address.");
            return;
        }
        if (cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }
        alert(`Order confirmed! Invoice sent to: ${email}`);
        cart = [];
        updateCart();
    }

    // Initial Load
    renderProducts(products);
</script>

</body>
</html>
